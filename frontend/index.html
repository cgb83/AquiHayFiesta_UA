<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AquiHayFiesta — Descubre, comparte y guarda contenido sobre fiestas y celebraciones. Vídeos, imágenes, audios y documentos de las mejores fiestas de España." />
    <title>AquiHayFiesta — Descubre y comparte fiestas</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #f5dde3;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.45s ease;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash img {
        width: 110px;
        height: auto;
        animation: ahf-pulse 1.6s ease-in-out infinite;
      }
      #splash-name {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 1.45rem;
        font-weight: 700;
        color: #7d3048;
        letter-spacing: 0.03em;
      }
      #splash-dots {
        display: flex;
        gap: 7px;
      }
      #splash-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #7d3048;
        opacity: 0.35;
        animation: ahf-dot 1.2s ease-in-out infinite;
      }
      #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes ahf-pulse {
        0%, 100% { transform: scale(1);    opacity: 1; }
        50%       { transform: scale(1.07); opacity: 0.82; }
      }
      @keyframes ahf-dot {
        0%, 60%, 100% { transform: translateY(0);   opacity: 0.35; }
        30%            { transform: translateY(-7px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/assets/logo.png" alt="AquiHayFiesta" />
      <div id="splash-name">AquiHayFiesta</div>
      <div id="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
